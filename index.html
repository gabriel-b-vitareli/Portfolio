<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio de Certificados | Portfolio</title>
    <meta name="description" content="Portfólio interativo de certificados com scroll 3D animado e estética moderna dark.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Mesh Background -->
    <canvas id="meshCanvas"></canvas>

    <!-- Floating Particles -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Hero Section -->
    <header id="hero">
        <div class="hero-content">
            <div class="hero-badge">
                <span class="badge-dot"></span>
                <span class="badge-text">PORTFÓLIO DE CERTIFICADOS</span>
            </div>
            <h1 class="hero-title">
                <span class="title-line">Minhas</span>
                <span class="title-line title-accent">Conquistas</span>
            </h1>
            <p class="hero-subtitle">Uma jornada de aprendizado contínuo, documentada através de certificações e qualificações profissionais.</p>
            <div class="hero-stats" id="heroStats">
                <!-- Populated by JS -->
            </div>
            <div class="scroll-indicator">
                <div class="scroll-mouse">
                    <div class="scroll-wheel"></div>
                </div>
                <span>Role para explorar</span>
            </div>
        </div>
    </header>

    <!-- 3D Certificate Gallery -->
    <section id="gallery">
        <div class="gallery-header">
            <h2 class="section-title">Certificados</h2>
            <div class="gallery-controls">
                <div class="gallery-counter">
                    <span id="currentIndex">01</span>
                    <span class="counter-divider">/</span>
                    <span id="totalCount">00</span>
                </div>
                <div class="gallery-nav">
                    <button class="nav-btn" id="prevBtn" aria-label="Anterior">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <button class="nav-btn" id="nextBtn" aria-label="Próximo">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="gallery-viewport" id="galleryViewport">
            <div class="gallery-track" id="galleryTrack">
                <!-- Certificate cards injected by JS -->
            </div>
        </div>

        <div class="gallery-progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="gallery-dots" id="galleryDots">
            <!-- Dots injected by JS -->
        </div>
    </section>

    <!-- Certificate Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modalClose" aria-label="Fechar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
            <div class="modal-content">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="Certificado">
                </div>
                <div class="modal-info">
                    <div class="modal-category" id="modalCategory"></div>
                    <h3 class="modal-title" id="modalTitle"></h3>
                    <p class="modal-issuer" id="modalIssuer"></p>
                    <p class="modal-date" id="modalDate"></p>
                    <p class="modal-description" id="modalDescription"></p>
                    <div class="modal-skills" id="modalSkills"></div>
                    <a class="modal-link" id="modalLink" href="#" target="_blank" rel="noopener noreferrer">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
                        Ver Credencial
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer">
        <div class="footer-content">
            <p class="footer-text">Construído com dedicação &mdash; Cada certificado representa um passo adiante.</p>
            <div class="footer-links">
                <a href="#" class="footer-link" aria-label="GitHub">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                </a>
                <a href="#" class="footer-link" aria-label="LinkedIn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </a>
            </div>
        </div>
    </footer>

    <script src="certificates.js"></script>
    <script src="app.js"></script>
</body>
</html>
